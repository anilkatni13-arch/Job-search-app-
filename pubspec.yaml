name: ai_job_search_app
description: AI-powered Job Search, Resume Builder & Application Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.2.0
  firebase_messaging: ^15.0.3

  # Networking
  dio: ^5.4.3+1

  # Local storage
  shared_preferences: ^2.2.3

  # Multi-language
  easy_localization: ^3.0.7

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0

  # Utils
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  equatable: ^2.0.5
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/translations/
